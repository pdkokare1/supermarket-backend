# .github/workflows/deploy.yml
name: DailyPick Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# OPTIMIZATION: Concurrency group prevents multiple parallel builds from thrashing the Railway deployment pipeline
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=high

      # Railway handles the actual container build, this triggers it securely
      - name: Trigger Railway Zero-Downtime Deployment
        if: github.ref == 'refs/heads/main'
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "DailyPick-Backend"
