# .github/workflows/deploy.yml
name: DailyPick Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# OPTIMIZATION: Concurrency group prevents multiple parallel builds from thrashing the Railway deployment pipeline
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=high

      # ============================================================================
      # --- NEW: PRE-DEPLOYMENT LOAD TESTING GATES ---
      # ============================================================================
      - name: Setup K6 Stress Tester
        uses: grafana/setup-k6-action@v1

      - name: Boot Staging Server & Run K6 Performance Tests
        run: |
          # Booting the server in the background for local validation before cloud deployment
          npm run start &
          sleep 5 # Wait for server to bind to port
          k6 run tests/k6-stress-test.js
        env:
          NODE_ENV: test
          PORT: 3000
          # Inject mock DB/Redis URLs for the isolated test environment here

      # Railway handles the actual container build, this triggers it securely
      - name: Trigger Railway Zero-Downtime Deployment
        if: github.ref == 'refs/heads/main'
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "DailyPick-Backend"

      # ============================================================================
      # --- NEW: POST-DEPLOYMENT HEALTH VERIFICATION ---
      # ============================================================================
      - name: Health Check Railway Container
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Waiting 30 seconds for new container to spin up and replace the old one..."
          sleep 30
          echo "Verifying /api/health endpoint..."
          curl -f https://dailypick-backend-production-05d6.up.railway.app/api/health || exit 1
          echo "Deployment successful and reporting Healthy!"
